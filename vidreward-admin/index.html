<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول — VidReward DZ</title>
  <link rel="stylesheet" href="assets/css/theme.css" />
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      padding: 40px 32px;
      text-align: center;
    }
    .login-brand {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 4px 4px 12px var(--accent-soft);
    }
    .login-title {
      font-size: 22px;
      margin-bottom: 6px;
    }
    .login-subtitle {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 28px;
    }
    .field {
      margin-bottom: 16px;
      text-align: right;
    }
    .field label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .submit-btn {
      width: 100%;
      margin-top: 8px;
      text-align: center;
    }
    .error-msg {
      color: var(--red);
      font-size: 13px;
      margin-top: 14px;
      min-height: 18px;
    }
    .top-toggle {
      position: fixed;
      top: 20px;
      left: 20px;
    }
  </style>
</head>
<body>
  <button class="theme-toggle top-toggle" id="themeToggle" aria-label="تبديل الوضع الليلي/النهاري">
    <span class="knob">🌙</span>
  </button>

  <div class="login-wrapper">
    <form class="neu login-card" id="loginForm">
      <div class="neu login-brand">🎬</div>
      <h1 class="login-title">VidReward DZ</h1>
      <p class="login-subtitle">لوحة تحكم الأدمن</p>

      <div class="field">
        <label for="email">البريد الإلكتروني</label>
        <input class="neu-input" type="email" id="email" required autocomplete="username" />
      </div>

      <div class="field">
        <label for="password">كلمة المرور</label>
        <input class="neu-input" type="password" id="password" required autocomplete="current-password" />
      </div>

      <button type="submit" class="neu-btn neu-btn-accent submit-btn" id="submitBtn">
        دخول
      </button>

      <p class="error-msg" id="errorMsg"></p>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
