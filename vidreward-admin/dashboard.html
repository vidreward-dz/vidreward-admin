<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم — VidReward DZ</title>
  <link rel="stylesheet" href="assets/css/theme.css" />
  <style>
    body { display: flex; }

    .sidebar {
      width: 230px;
      display: flex;
      flex-direction: column;
      position: fixed;
      right: 0; top: 0; bottom: 0;
      z-index: 100;
      box-shadow: 4px 0 20px rgba(0,0,0,0.06);
    }
    .logo {
      padding: 24px 20px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 2px solid var(--border);
    }
    .logo-icon {
      width: 44px; height: 44px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 4px 4px 10px var(--accent-soft);
      font-size: 20px;
    }
    .logo-name { font-size: 16px; font-weight: 900; }
    .logo-sub { font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 1px; }

    .nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
    .nav-section {
      font-size: 10px; color: var(--text-secondary);
      font-weight: 700; padding: 10px 10px 6px; letter-spacing: 1.5px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; border-radius: 14px;
      cursor: default; margin-bottom: 3px;
      font-size: 13px; color: var(--text-secondary);
      transition: all 0.2s;
    }
    .nav-item.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      box-shadow: 4px 4px 12px var(--accent-soft);
    }
    .nav-item.disabled { opacity: 0.45; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-badge {
      margin-right: auto; background: var(--red); color: white;
      font-size: 10px; font-weight: 900; padding: 2px 7px;
      border-radius: 20px; font-family: var(--font-num);
    }

    .sidebar-bottom { padding: 16px 12px; border-top: 2px solid var(--border); }
    .admin-card { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 16px; }
    .admin-av {
      width: 36px; height: 36px; border-radius: 11px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .admin-name { font-size: 13px; font-weight: 700; }
    .admin-role { font-size: 10px; color: var(--accent); }
    .logout-link { font-size: 11px; color: var(--red); cursor: pointer; margin-top: 8px; display: block; text-align: center; }

    .main { margin-right: 230px; flex: 1; display: flex; flex-direction: column; }

    .topbar {
      padding: 16px 28px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }
    .page-title { font-size: 20px; }
    .page-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }

    .content { padding: 24px 28px; flex: 1; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }
    .stat-card { border-radius: 20px; padding: 20px; }
    .stat-icon {
      width: 44px; height: 44px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px; font-size: 20px;
    }
    .si-purple { background: var(--accent-soft); }
    .si-green { background: var(--green-soft); }
    .si-gold { background: var(--gold-soft); }
    .si-red { background: var(--red-soft); }

    .stat-val { font-size: 26px; font-weight: 900; font-family: var(--font-num); }
    .stat-lbl { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .stat-na { font-size: 12px; color: var(--text-secondary); font-style: italic; margin-top: 6px; }
  </style>
</head>
<body>
  <aside class="sidebar neu">
    <div class="logo">
      <div class="logo-icon">🎬</div>
      <div>
        <div class="logo-name display">VidReward DZ</div>
        <div class="logo-sub">ADMIN PANEL</div>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-section">الرئيسية</div>
      <div class="nav-item active neu-sm">🏠 Dashboard</div>

      <div class="nav-section">المستخدمون</div>
      <div class="nav-item disabled">👥 المستخدمين</div>
      <div class="nav-item disabled">🚩 حسابات مشبوهة</div>

      <div class="nav-section">الإعلانات</div>
      <div class="nav-item disabled">🎥 الفيديوهات</div>
      <div class="nav-item disabled">📢 الحملات</div>
      <div class="nav-item disabled">🏢 المعلنين</div>

      <div class="nav-section">المالية</div>
      <div class="nav-item disabled">💳 السحوبات</div>

      <div class="nav-section">الأدوات</div>
      <div class="nav-item disabled">🔔 الإشعارات</div>
      <div class="nav-item disabled">⚙️ الإعدادات</div>
    </nav>

    <div class="sidebar-bottom">
      <div class="admin-card neu-in">
        <div class="admin-av">👤</div>
        <div>
          <div class="admin-name" id="adminEmail">أدمن</div>
          <div class="admin-role">Administrator</div>
        </div>
      </div>
      <span class="logout-link" id="logoutBtn">تسجيل الخروج</span>
    </div>
  </aside>

  <main class="main">
    <div class="topbar neu">
      <div>
        <h1 class="page-title display">مرحباً 👋</h1>
        <p class="page-sub">نظرة عامة على أداء المنصة</p>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" id="themeToggle" aria-label="تبديل الوضع الليلي/النهاري">
          <span class="knob">🌙</span>
        </button>
      </div>
    </div>

    <div class="content">
      <section class="stats-grid" id="statsGrid"></section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
